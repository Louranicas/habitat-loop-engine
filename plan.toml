[project]
name = "habitat-loop-engine"
status = "m0-runtime"
root = "/home/louranicas/claude-code-workspace/habitat-loop-engine"
canonical_plan_file = "plan.toml"

[authorization]
scaffold = true
m0_runtime = true
live_integrations = false
cron_daemons = false

[quality]
layers_exact = 7
specs_exact = 13
schematics_min = 11
modules_min = 50
current_m0_modules = 4
framework_module_target = 50
framework_rust_module_target = 46
framework_ops_surface_target = 4
source_topology_gate = "scripts/verify-source-topology.sh"
anti_patterns_min = 8
use_patterns_min = 6

[[layers]]
id = "L01"
doc = "ai_docs/layers/L01_FOUNDATION.md"
cluster = "HLE-C01"

[[layers]]
id = "L02"
doc = "ai_docs/layers/L02_PERSISTENCE.md"
cluster = "HLE-C02"

[[layers]]
