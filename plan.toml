[[modules]]
id = "M004"
name = "hle-cli"
layer = "L06"
crate = "crates/hle-cli"
module_doc = "ai_docs/modules/M004_HLE_CLI.md"

[scripts]
verify_sync = "scripts/verify-sync.sh"
