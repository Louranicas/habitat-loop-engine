[scripts]
verify_sync = "scripts/verify-sync.sh"
quality_gate = "scripts/quality-gate.sh"
doc_links = "scripts/verify-doc-links.sh"
claude_folder = "scripts/verify-claude-folder.sh"
anti_patterns = "scripts/verify-antipattern-registry.sh"
semantic_predicates = "scripts/verify-semantic-predicates.sh"
module_map = "scripts/verify-module-map.sh"
layer_dag = "scripts/verify-layer-dag.sh"
receipt_schema = "scripts/verify-receipt-schema.sh"
negative_controls = "scripts/verify-negative-controls.sh"

runbook_schema = "scripts/verify-runbook-schema.sh"
receipt_graph = "scripts/verify-receipt-graph.sh"
test_taxonomy = "scripts/verify-test-taxonomy.sh"
bounded_logs = "scripts/verify-bounded-logs.sh"
use_patterns = "scripts/verify-usepattern-registry.sh"
skeleton_only = "scripts/verify-skeleton-only.sh"
framework_hash_freshness = "scripts/verify-framework-hash-freshness.sh"
vault_parity = "scripts/verify-vault-parity.sh"
bin_wrapper_parity = "scripts/verify-bin-wrapper-parity.sh"
script_safety = "scripts/verify-script-safety.sh"
local_loop_helpers = "scripts/verify-local-loop-helpers.sh"
m0_runtime = "scripts/verify-m0-runtime.sh"
source_topology = "scripts/verify-source-topology.sh"

[full_codebase]
status = "planned_topology_incomplete"
layers_exact = 7
module_surfaces_exact = 50
rust_modules_exact = 46
ops_surfaces_exact = 4
cluster_count = 9
cluster_manifest = "ai_docs/CLUSTERED_MODULES.md"
code_module_map = "ai_docs/CODE_MODULE_MAP.md"
strict_gate = "scripts/verify-source-topology.sh --strict"
fleet_mode = "claude-code-arena-style"

[[full_codebase_clusters]]
id = "C01_EVIDENCE_INTEGRITY"
name = "Evidence Integrity"
layers = "L01/L02/L04"
module_surfaces = 5
synergy = "receipt hash -> claim store -> receipt store -> verifier recompute -> final claim evaluator"

[[full_codebase_clusters]]
id = "C02_AUTHORITY_STATE"
name = "Authority and State"
layers = "L01/L03/L04"
module_surfaces = 5
synergy = "type-state authority and transition table prevent executor self-certification"

[[full_codebase_clusters]]
id = "C03_BOUNDED_EXECUTION"
name = "Bounded Execution"
layers = "L03"
module_surfaces = 5
synergy = "local runner + phase executor + timeout/retry policies make every runtime path finite and verifier-visible"

[[full_codebase_clusters]]
id = "C04_ANTI_PATTERN_INTELLIGENCE"
name = "Anti-Pattern Intelligence"
layers = "L01/L02/L04"
module_surfaces = 5
synergy = "catalogued anti-patterns become scanner events, test taxonomy checks, and false-pass audits"

[[full_codebase_clusters]]
id = "C05_PERSISTENCE_LEDGER"
name = "Persistence Ledger"
layers = "L02"
module_surfaces = 7
synergy = "schema-first ledger ties runs, ticks, evidence, verifier results, and blockers into append-only proof"

[[full_codebase_clusters]]
id = "C06_RUNBOOK_SEMANTICS"
name = "Runbook Semantics"
layers = "L07"
module_surfaces = 8
synergy = "incident-response runbooks reuse workflow authority instead of becoming a parallel engine"

[[full_codebase_clusters]]
id = "C07_DISPATCH_BRIDGES"
name = "Dispatch Bridges"
layers = "L05"
module_surfaces = 6
synergy = "Zellij/Atuin/DevOps/STcortex/Watcher bridges share contract parity and read-only/live-write gates"

[[full_codebase_clusters]]
id = "C08_CLI_SURFACE"
name = "CLI Surface"
layers = "L06"
module_surfaces = 5
synergy = "operator commands remain thin typed adapters over executor/verifier/runbook authority"

[[full_codebase_clusters]]
id = "C09_DEVOPS_QI_OPERATIONAL_LANE"
name = "DevOps/QI Operational Lane"
layers = "L06/scripts"
module_surfaces = 4
synergy = "scripts enforce docs-source-gate parity and prevent quiet topology collapse"

